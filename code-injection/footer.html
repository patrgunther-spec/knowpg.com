<script>
(function () {
  'use strict';

  /* ── 1. SOCIAL PROOF BAR ──
     Injects a social media link bar into any Squarespace block
     that has the CSS class "popcast-social-bar-target" or into
     the footer automatically.
     To use: add a Code Block or Spacer Block and give it the
     class "popcast-social-bar-target" in Squarespace's editor. */

  var socialLinks = [
    {
      name: 'TikTok',
      url: 'https://www.tiktok.com/@popcast',
      icon: '<svg viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1 0-5.78 2.92 2.92 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 3 15.57 6.33 6.33 0 0 0 9.37 22a6.33 6.33 0 0 0 6.38-6.22V9.4a8.16 8.16 0 0 0 3.84.96V7.1a4.85 4.85 0 0 1-1-.41z"/></svg>'
    },
    {
      name: 'Instagram',
      url: 'https://www.instagram.com/popcast',
      icon: '<svg viewBox="0 0 24 24"><path d="M12 2.16c3.2 0 3.58.01 4.85.07 1.17.05 1.97.24 2.44.41.61.24 1.05.52 1.51.98.46.46.74.9.98 1.51.17.47.36 1.27.41 2.44.06 1.27.07 1.65.07 4.85s-.01 3.58-.07 4.85c-.05 1.17-.24 1.97-.41 2.44a4.07 4.07 0 0 1-.98 1.51 4.07 4.07 0 0 1-1.51.98c-.47.17-1.27.36-2.44.41-1.27.06-1.65.07-4.85.07s-3.58-.01-4.85-.07c-1.17-.05-1.97-.24-2.44-.41a4.07 4.07 0 0 1-1.51-.98 4.07 4.07 0 0 1-.98-1.51c-.17-.47-.36-1.27-.41-2.44C2.17 15.58 2.16 15.2 2.16 12s.01-3.58.07-4.85c.05-1.17.24-1.97.41-2.44.24-.61.52-1.05.98-1.51A4.07 4.07 0 0 1 5.13 2.22c.47-.17 1.27-.36 2.44-.41C8.84 2.17 9.22 2.16 12 2.16zM12 0C8.74 0 8.33.01 7.05.07 5.78.13 4.9.33 4.14.63a5.82 5.82 0 0 0-2.13 1.38A5.82 5.82 0 0 0 .63 4.14C.33 4.9.13 5.78.07 7.05.01 8.33 0 8.74 0 12s.01 3.67.07 4.95c.06 1.27.26 2.15.56 2.91.31.79.72 1.47 1.38 2.13a5.82 5.82 0 0 0 2.13 1.38c.76.3 1.64.5 2.91.56C8.33 23.99 8.74 24 12 24s3.67-.01 4.95-.07c1.27-.06 2.15-.26 2.91-.56a5.82 5.82 0 0 0 2.13-1.38 5.82 5.82 0 0 0 1.38-2.13c.3-.76.5-1.64.56-2.91.06-1.28.07-1.69.07-4.95s-.01-3.67-.07-4.95c-.06-1.27-.26-2.15-.56-2.91a5.82 5.82 0 0 0-1.38-2.13A5.82 5.82 0 0 0 19.86.63C19.1.33 18.22.13 16.95.07 15.67.01 15.26 0 12 0zm0 5.84A6.16 6.16 0 1 0 18.16 12 6.16 6.16 0 0 0 12 5.84zM12 16a4 4 0 1 1 4-4 4 4 0 0 1-4 4zm7.85-10.4a1.44 1.44 0 1 1-1.44-1.44 1.44 1.44 0 0 1 1.44 1.44z"/></svg>'
    },
    {
      name: 'YouTube',
      url: 'https://www.youtube.com/@popcast',
      icon: '<svg viewBox="0 0 24 24"><path d="M23.5 6.19a3.02 3.02 0 0 0-2.12-2.14C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.38.55A3.02 3.02 0 0 0 .5 6.19 31.6 31.6 0 0 0 0 12a31.6 31.6 0 0 0 .5 5.81 3.02 3.02 0 0 0 2.12 2.14c1.88.55 9.38.55 9.38.55s7.5 0 9.38-.55a3.02 3.02 0 0 0 2.12-2.14A31.6 31.6 0 0 0 24 12a31.6 31.6 0 0 0-.5-5.81zM9.55 15.57V8.43L15.82 12l-6.27 3.57z"/></svg>'
    }
  ];

  function injectSocialBar() {
    var target = document.querySelector('.popcast-social-bar-target');
    if (!target && document.querySelector('.Footer')) {
      target = document.querySelector('.Footer');
    }
    if (!target) return;

    var bar = document.createElement('div');
    bar.className = 'popcast-social-bar';
    bar.setAttribute('aria-label', 'Follow Popcast on social media');

    socialLinks.forEach(function (link) {
      var a = document.createElement('a');
      a.href = link.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.setAttribute('aria-label', 'Follow on ' + link.name);
      a.innerHTML = link.icon + '<span>' + link.name + '</span>';
      bar.appendChild(a);
    });

    if (target.classList.contains('popcast-social-bar-target')) {
      target.appendChild(bar);
    } else {
      target.insertBefore(bar, target.firstChild);
    }
  }

  /* ── 2. EXTERNAL LINKS IN NEW TAB ──
     Automatically opens all external links in a new tab
     so visitors stay on knowpg.com */

  function externalLinksNewTab() {
    var links = document.querySelectorAll('a[href^="http"]');
    var host = window.location.hostname;
    links.forEach(function (link) {
      if (link.hostname !== host) {
        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noopener noreferrer');
      }
    });
  }

  /* ── 3. SCROLL-TO-TOP BUTTON ──
     Shows a floating button after scrolling down 400px */

  function createScrollToTop() {
    var btn = document.createElement('button');
    btn.className = 'popcast-scroll-top';
    btn.setAttribute('aria-label', 'Scroll to top');
    btn.innerHTML = '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>';

    btn.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;width:44px;height:44px;border-radius:50%;border:none;background:rgba(0,0,0,0.7);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:opacity 0.3s ease,visibility 0.3s ease,transform 0.2s ease;box-shadow:0 2px 12px rgba(0,0,0,0.2);';

    btn.addEventListener('click', function () {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    btn.addEventListener('mouseenter', function () {
      btn.style.transform = 'scale(1.1)';
    });
    btn.addEventListener('mouseleave', function () {
      btn.style.transform = 'scale(1)';
    });

    document.body.appendChild(btn);

    var ticking = false;
    window.addEventListener('scroll', function () {
      if (!ticking) {
        window.requestAnimationFrame(function () {
          if (window.scrollY > 400) {
            btn.style.opacity = '1';
            btn.style.visibility = 'visible';
          } else {
            btn.style.opacity = '0';
            btn.style.visibility = 'hidden';
          }
          ticking = false;
        });
        ticking = true;
      }
    });
  }

  /* ── 4. CURRENT YEAR IN FOOTER ──
     Keeps the copyright year up-to-date automatically.
     Looks for any element with class "popcast-year" and
     replaces its content with the current year. */

  function updateCopyrightYear() {
    var yearEls = document.querySelectorAll('.popcast-year');
    var year = new Date().getFullYear();
    yearEls.forEach(function (el) {
      el.textContent = year;
    });
  }

  /* ── 5. LAZY VIDEO EMBEDS ──
     Converts video iframes to click-to-load for faster page speed.
     Add class "popcast-lazy-video" to any embed block wrapper. */

  function lazyLoadVideos() {
    var wrappers = document.querySelectorAll('.popcast-lazy-video iframe');
    wrappers.forEach(function (iframe) {
      var src = iframe.getAttribute('src');
      if (!src) return;
      iframe.setAttribute('data-src', src);
      iframe.removeAttribute('src');
      iframe.style.cursor = 'pointer';
      iframe.style.opacity = '0.8';

      var played = false;
      iframe.parentElement.addEventListener('click', function () {
        if (played) return;
        iframe.setAttribute('src', iframe.getAttribute('data-src'));
        iframe.style.opacity = '1';
        played = true;
      });
    });
  }

  /* ── INITIALIZE ── */
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  function init() {
    injectSocialBar();
    externalLinksNewTab();
    createScrollToTop();
    updateCopyrightYear();
    lazyLoadVideos();
  }

  /* Re-run on AJAX page loads (Squarespace uses AJAX navigation) */
  window.addEventListener('mercury:load', function () {
    injectSocialBar();
    externalLinksNewTab();
    updateCopyrightYear();
    lazyLoadVideos();
  });

})();
</script>
