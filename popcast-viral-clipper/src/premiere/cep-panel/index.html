<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Popcast Viral Clipper</title>
  <style>
    /* ── Adobe CEP Panel Theme ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1e1e1e;
      --bg-secondary: #2a2a2a;
      --bg-hover: #333;
      --text: #e0e0e0;
      --text-muted: #888;
      --accent: #6c5ce7;
      --accent-hover: #7d6ff0;
      --success: #00b894;
      --warning: #fdcb6e;
      --danger: #e17055;
      --border: #3a3a3a;
      --radius: 6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.02em;
    }
    .header .version {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* ── Buttons ── */
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    button.secondary {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
    }
    button.secondary:hover { background: var(--bg-hover); }

    /* ── Input Section ── */
    .section {
      margin-bottom: 14px;
    }
    .section label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select, input[type="number"] {
      width: 100%;
      padding: 6px 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 12px;
    }

    .row {
      display: flex;
      gap: 8px;
    }
    .row > * { flex: 1; }

    /* ── Controls Bar ── */
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }
    .controls button { flex: 1; }

    /* ── Status Bar ── */
    .status-bar {
      padding: 8px 10px;
      background: var(--bg-secondary);
      border-radius: var(--radius);
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-bar .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .status-bar.analyzing .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results List ── */
    .results {
      max-height: 400px;
      overflow-y: auto;
    }
    .clip-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .clip-card:hover {
      border-color: var(--accent);
      background: var(--bg-hover);
    }
    .clip-card .rank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      border-radius: 50%;
      margin-right: 6px;
    }
    .clip-card .timecode {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 11px;
      color: var(--text-muted);
    }
    .clip-card .score-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 6px 0;
      overflow: hidden;
    }
    .clip-card .score-bar .fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .clip-card .score-bar .fill.high { background: var(--success); }
    .clip-card .score-bar .fill.medium { background: var(--warning); }
    .clip-card .score-bar .fill.low { background: var(--danger); }
    .clip-card .hook {
      font-size: 11px;
      color: var(--text);
      margin-top: 4px;
      line-height: 1.4;
    }
    .clip-card .meta {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 10px;
      color: var(--text-muted);
    }
    .clip-card .actions {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .clip-card .actions button {
      font-size: 10px;
      padding: 4px 8px;
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 8px; }
    .empty-state p { font-size: 12px; line-height: 1.5; }
  </style>
</head>
<body>

  <div class="header">
    <h1>POPCAST VIRAL CLIPPER</h1>
    <span class="version">v1.0.0</span>
  </div>

  <!-- Configuration -->
  <div class="section">
    <label>Clip Length Range</label>
    <div class="row">
      <div>
        <input type="number" id="minLength" value="15" min="5" max="60" />
      </div>
      <div>
        <input type="number" id="maxLength" value="60" min="15" max="120" />
      </div>
    </div>
  </div>

  <div class="section">
    <label>Number of Clips</label>
    <input type="number" id="topCount" value="10" min="1" max="50" />
  </div>

  <div class="section">
    <label>Analysis Mode</label>
    <select id="analysisMode">
      <option value="local">Local (Fast)</option>
      <option value="ai">AI-Enhanced (Claude API)</option>
    </select>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button id="btnAnalyze" onclick="startAnalysis()">Analyze Active Sequence</button>
    <button class="secondary" id="btnImport" onclick="importTranscript()">Import SRT</button>
  </div>

  <!-- Status -->
  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Ready. Open a sequence and click Analyze.</span>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="empty-state">
      <div class="icon">&#9889;</div>
      <p>No clips analyzed yet.<br/>Load a sequence or import an SRT transcript to get started.</p>
    </div>
  </div>

  <!-- CEP Script Loader -->
  <script src="./CSInterface.js"></script>
  <script src="./panel.js"></script>

</body>
</html>
