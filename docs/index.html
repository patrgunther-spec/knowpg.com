<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<meta name="theme-color" content="#06100A" />
<title>Golf Swing Coach</title>
<style>
:root{
  --bg:#06100A;--bgT:#0A1A11;--bgB:#03080A;
  --panel:#0F1C13;--panelHi:#16291C;--pBorder:#1F3A2A;
  --fairway:#0BBF4D;--fairwayHi:#19E160;--fairwayDeep:#06703A;
  --gold:#F5C518;--goldHi:#FFE174;--goldDeep:#9C7A05;
  --white:#FFF;--silver:#CDD6CF;--silverDim:#7A8A80;
  --danger:#E63946;--dangerDeep:#7A1620;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--white);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100%;-webkit-font-smoothing:antialiased}
body{background:radial-gradient(circle at top,var(--bgT),transparent 60%),radial-gradient(circle at bottom,var(--bgB),transparent 60%),var(--bg);min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;color:inherit}
a{color:var(--gold);text-decoration:none}
.container{max-width:720px;margin:0 auto;padding:16px 16px 80px}
.eyebrow{font-size:11px;letter-spacing:3px;font-weight:900;color:var(--gold);text-transform:uppercase}
.title{font-size:34px;font-weight:900;font-style:italic;letter-spacing:1px;text-transform:uppercase;line-height:1.1}
.title .accent{color:var(--fairwayHi)}
.subtitle{font-size:14px;color:var(--silver);line-height:1.5;margin-top:12px}
.frame{border:2px solid var(--gold);background:#02080A;padding:2px;margin-bottom:16px}
.frame-inner{border:1px solid var(--pBorder);background:var(--panel)}
.hero{padding:22px;background:linear-gradient(180deg,#0A2418 0%,#06120C 100%);border:1px solid var(--pBorder)}
.hero-stats{display:flex;margin-top:16px;padding-top:14px;border-top:1px solid var(--pBorder)}
.hero-stat{flex:1;text-align:center}
.hero-stat-value{font-size:22px;font-weight:900;font-style:italic;color:var(--fairwayHi)}
.hero-stat-label{font-size:10px;letter-spacing:2px;font-weight:800;color:var(--silverDim);text-transform:uppercase;margin-top:2px}
.hero-stat-sep{width:1px;background:var(--pBorder);margin:4px 0}
.btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:16px;border:2px solid var(--gold);background:linear-gradient(135deg,var(--fairwayHi),var(--fairwayDeep));color:var(--white);font-weight:900;letter-spacing:1.6px;text-transform:uppercase;font-style:italic;font-size:16px;margin-bottom:10px;-webkit-tap-highlight-color:transparent;transition:transform .06s ease,opacity .15s ease}
.btn:active{transform:scale(.985)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--goldDeep));color:#241A00}
.btn-ghost{background:var(--panel);border-color:var(--pBorder);color:var(--silver)}
.btn-content{display:flex;align-items:center;gap:12px}
.btn-icon{font-size:22px}
.btn-text-stack .label{display:block}
.btn-text-stack .caption{display:block;font-size:11px;letter-spacing:.8px;font-weight:700;opacity:.85;margin-top:2px;font-style:normal}
.btn-chev{font-size:22px;font-weight:900}
.section-label{display:flex;align-items:center;gap:12px;margin:16px 0 8px;color:var(--gold);font-size:11px;letter-spacing:2.8px;font-weight:900;font-style:italic;text-transform:uppercase}
.section-label::before,.section-label::after{content:'';flex:1;height:1px;background:var(--pBorder)}
.how{padding:14px;background:var(--panel);border:1px solid var(--pBorder)}
.how-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--pBorder)}
.how-row:last-child{border-bottom:none}
.how-num{font-size:26px;font-weight:900;font-style:italic;color:var(--gold);width:56px}
.how-title{font-size:15px;font-weight:900;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:2px}
.how-text{color:var(--silver);font-size:13px;line-height:1.4}
.hud{padding:14px;background:var(--panel);border:1px solid var(--pBorder)}
.hud-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:10px}
.hud-label{font-size:10px;letter-spacing:2.5px;font-weight:900;color:var(--silverDim);text-transform:uppercase}
.hud-value{flex:1;font-size:14px;font-weight:900;letter-spacing:1.4px;font-style:italic;text-align:right}
.hud-small{font-size:11px;letter-spacing:1.2px;font-weight:700;text-transform:uppercase;color:var(--silver)}
.status-dot{width:10px;height:10px;border-radius:50%;background:var(--fairwayHi);box-shadow:0 0 8px var(--fairwayHi);animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4;transform:scale(.85)}50%{opacity:1;transform:scale(1.15)}}
.progress-track{height:12px;background:#040A06;border:1px solid var(--pBorder);overflow:hidden;margin:8px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--fairwayHi),var(--fairwayDeep));transition:width .3s ease}
.frames{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.frame-card{background:#02080A;border:1px solid var(--pBorder);overflow:hidden}
.frame-img{width:100%;aspect-ratio:9/16;object-fit:cover;display:block;background:#000}
.frame-bar{display:flex;align-items:center;padding:6px 8px;border-top:1px solid var(--pBorder);background:var(--panelHi);gap:6px}
.frame-tag{color:var(--gold);font-weight:900;font-size:10px;letter-spacing:1px}

.report-header{padding:18px;background:linear-gradient(180deg,#0E2418 0%,#04100A 100%);border:1px solid var(--pBorder)}

.block{border-left:3px solid;padding:6px 10px;margin-top:8px}

.block-body{color:var(--silver);font-size:13px;line-height:1.4;white-space:pre-line}

.meta-chip-label{font-size:9px;font-weight:900;letter-spacing:1.6px;margin-bottom:2px}
.meta-chip-text{color:var(--white);font-size:12px;font-weight:700}
.brdrow{padding:10px 0;border-bottom:1px solid var(--pBorder);cursor:pointer;display:block;width:100%;text-align:left}
.brdrow:last-child{border-bottom:none}
.brdrow-top{display:flex;align-items:center;gap:10px}
.brd-thumb{width:50px;height:70px;background:#000;border:1px solid var(--pBorder);flex-shrink:0;object-fit:cover}
.brd-tag{color:var(--gold);font-size:9px;letter-spacing:2px;font-weight:900}
.brd-title{font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase;margin:2px 0}
.brd-what{font-size:12px;color:var(--silver);line-height:1.4}

.next-tip{padding:12px;background:#1A1300;border:1px solid var(--goldDeep)}
.next-tip-label{font-weight:900;color:var(--gold);letter-spacing:2.5px;font-size:10px;margin-bottom:4px}

.input{width:100%;padding:12px;font-size:14px;background:#02080A;border:1px solid var(--pBorder);color:var(--white);letter-spacing:1px;margin:10px 0}
.error-box{padding:16px;background:#1A0509;border:2px solid var(--danger);margin-bottom:14px}
.error-title{color:var(--danger);font-size:14px;font-weight:900;letter-spacing:2.5px;text-transform:uppercase;font-style:italic;margin-bottom:8px}
.error-text{color:var(--silver);font-size:13px;line-height:1.4;word-break:break-word}
.footer{text-align:center;color:var(--silverDim);font-size:9px;letter-spacing:2px;font-weight:700;margin-top:24px}
.schedule{display:flex;flex-direction:column;border:1px solid var(--pBorder)}
.sched-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--pBorder);background:#02080A}
.sched-row:last-child{border-bottom:none}
.sched-day{width:84px;flex-shrink:0;font-weight:900;font-style:italic;color:var(--gold);letter-spacing:1.2px;text-transform:uppercase;font-size:12px}
.sched-focus{flex:1;color:var(--white);font-size:13px;line-height:1.35}

input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;height:22px;background:transparent;outline:none;margin:4px 0}

input[type="range"]::-moz-range-track{height:6px;background:linear-gradient(90deg,var(--fairwayDeep),var(--fairwayHi));border:1px solid var(--pBorder)}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:20px;height:20px;background:var(--gold);border:2px solid #02080A;margin-top:-9px;cursor:pointer}

@media (max-width:480px){.title{font-size:28px}.takeaway-title{font-size:15px}.frames{grid-template-columns:repeat(2,1fr)}}
</style>

<body>
<main class="container" id="root"></main>

<script>
/* Golf Swing Coach - single-file standalone build.
 * Calls Google Gemini directly from the browser. The API key is stored only
 * in localStorage. No backend, no servers, no charges. */

const FRAME_LABELS = [
  'Address','Takeaway','Hands At Hip (Back)','Lead Arm Parallel (Back)',
  'Top Of Backswing','Transition','Lead Arm Parallel (Down)','Pre-Impact',
  'Impact','Post-Impact Extension','Mid Follow-Through','Finish'
];
const FRAME_COUNT = 12;
const MOTION_W = 96, MOTION_H = 144;
const MOTION_FPS = 30;
const MIN_SAMPLES = 30, MAX_SAMPLES = 600;
const OUT_MAX = 720;
// Free, public, no-API-key AI vision service. We POST 12 swing frames + a
// coaching prompt and get back structured JSON. We discover the current
// vision-capable models on first load so model renames never break us.
const POLLINATIONS_URL = 'https://text.pollinations.ai/openai';
const POLLINATIONS_MODELS_URL = 'https://text.pollinations.ai/models';
// Wide fallback list - some are aliases, some may 404, the cascade just
// skips to the next on any failure.
const VISION_MODEL_FALLBACK = [
  'openai', 'openai-fast', 'openai-large', 'openai-reasoning',
  'claude-hybridspace', 'claude', 'gemini', 'gemini-thinking',
  'mistral', 'llama', 'qwen-coder',
];
let cachedModels = null;

async function discoverVisionModels() {
  if (cachedModels) return cachedModels;
  try {
    const res = await fetch(POLLINATIONS_MODELS_URL, { cache: 'no-store' });
    if (res.ok) {
      const list = await res.json();
      const vision = (Array.isArray(list) ? list : [])
        .filter((m) => {
          const name = m?.name || m?.id || m?.slug;
          if (!name) return false;
          // Heuristics: prefer entries flagged as vision/multimodal/image-capable.
          if (m.vision === true) return true;
          if (Array.isArray(m.input_modalities) &&
              m.input_modalities.some((x) => /image|vision|multimodal/i.test(String(x)))) return true;
          if (Array.isArray(m.modalities) &&
              m.modalities.some((x) => /image|vision|multimodal/i.test(String(x)))) return true;
          if (m.multimodal === true) return true;
          // Fall back to name-based hints
          return /openai|gpt|claude|gemini|llava|qwen-vl|llama-vision/i.test(String(name));
        })
        .map((m) => m.name || m.id || m.slug)
        .filter(Boolean);
      if (vision.length) {
        // Combine discovered models with our fallback list (de-duped, discovered first).
        cachedModels = Array.from(new Set([...vision, ...VISION_MODEL_FALLBACK]));
        return cachedModels;
      }
    }
  } catch {}
  cachedModels = VISION_MODEL_FALLBACK.slice();
  return cachedModels;
}

const SCAN_QUOTES = [
  'Watching the whole clip…','Finding the actual swing…',
  'Skipping practice strokes…','Locking onto impact…'
];
const COACH_QUOTES = [
  'Studying your tempo…','Checking your spine angle…','Tracing the club path…',
  'Reading your weight transfer…','Looking at impact position…',
  'Comparing to tour pros…','Spotting strokes you can save…',
  'Drafting your custom drills…','Writing it all down…'
];

const SYSTEM_PROMPT = `You are an elite, PGA-Tour-level golf swing coach. The user wants the most thorough, specific, beginner-friendly coaching possible.

You will receive 12 still frames from the SAME swing, sampled in order from address through finish. Treat all 12 frames as one continuous swing.

The 12 frames, in order, are:
  1. Address               2. Takeaway              3. Hands At Hip (Back)
  4. Lead Arm Parallel (Back)  5. Top Of Backswing  6. Transition
  7. Lead Arm Parallel (Down)  8. Pre-Impact        9. Impact
 10. Post-Impact Extension 11. Mid Follow-Through  12. Finish

CAMERA ANGLE: Detect the angle (down-the-line / face-on / behind / overhead) and adapt your analysis. State the angle in the report.

WRITING STYLE - this is critical:
- Write so a smart 10-year-old American would understand. Short sentences. Simple words.
- Whenever you use a golf term, define it in 5-12 plain words RIGHT AFTER the term, in parentheses. Example: "Stop casting (throwing the club out early like a fishing rod)."
- Use simple analogies. Be very specific about body parts (assume right-handed unless visually clear).

DEPTH - 5 to 10 ACTIONABLE TAKEAWAYS, ranked High → Low priority. For each:
  * title              short imperative
  * whatToFix          1-3 sentences (frame-specific)
  * whyItMatters       1-3 sentences on strokes it costs and typical miss
  * howToFix           NUMBERED STEPS the kid can do at home (4-7 steps)
  * commonMistakes     up to 3
  * reps               concrete dosage
  * estimatedHandicapImpact  realistic
  * priority           High|Medium|Low

Return ONLY valid JSON with this exact schema. No prose outside JSON, no fences:

{
  "playerHandle": "Short fun nickname. 1-3 words.",
  "cameraAngle": "down-the-line | face-on | behind | overhead | unclear",
  "handedness": "right | left | unclear",
  "summary": "2-4 sentences plain words.",
  "oneThingYouDidWell": "One specific positive thing with frame number.",
  "ballFlightExplanation": "Plain-language paragraph citing specific frames.",
  "frameBreakdown": [
    {"label":"Address","whatISee":"...","tip":"..."},
    {"label":"Takeaway","whatISee":"...","tip":"..."},
    {"label":"Hands At Hip (Back)","whatISee":"...","tip":"..."},
    {"label":"Lead Arm Parallel (Back)","whatISee":"...","tip":"..."},
    {"label":"Top Of Backswing","whatISee":"...","tip":"..."},
    {"label":"Transition","whatISee":"...","tip":"..."},
    {"label":"Lead Arm Parallel (Down)","whatISee":"...","tip":"..."},
    {"label":"Pre-Impact","whatISee":"...","tip":"..."},
    {"label":"Impact","whatISee":"...","tip":"..."},
    {"label":"Post-Impact Extension","whatISee":"...","tip":"..."},
    {"label":"Mid Follow-Through","whatISee":"...","tip":"..."},
    {"label":"Finish","whatISee":"...","tip":"..."}
  ],
  "takeaways": [
    {"title":"...","whatToFix":"...","whyItMatters":"...","howToFix":"1) ... 2) ... 3) ... 4) ...","commonMistakes":["...","..."],"reps":"...","estimatedHandicapImpact":"...","priority":"High"}
  ],
  "practicePlan": {
    "summary":"...",
    "weeklySchedule":[{"day":"Monday","focus":"Drill X","minutes":15}]
  },
  "nextVideoTip": "..."
}

Provide 5 to 10 takeaways. Be thorough.`;

/* ===== State ===== */
const state = {
  view: 'home',
  frames: [],
  swing: null,
  videoUrl: null,
  videoDuration: 0,
  progress: 0,
  stage: 'idle',
  error: null,
  report: null,
  quoteIdx: 0,
  pickRange: null,
  showScrubber: false,
  openFrame: null,
};
let quoteTimer = null;

function setState(patch) {
  Object.assign(state, patch);
  render();
}

/* ===== Frame extraction with motion-based swing detection ===== */
function seek(video, t) {
  return new Promise((resolve, reject) => {
    const onSeeked = () => { cleanup(); setTimeout(resolve, 30); };
    const onError = () => { cleanup(); reject(new Error('Could not seek video.')); };
    const cleanup = () => {
      video.removeEventListener('seeked', onSeeked);
      video.removeEventListener('error', onError);
    };
    video.addEventListener('seeked', onSeeked);
    video.addEventListener('error', onError);
    video.currentTime = Math.max(0, t);
  });
}

function movingAverage(arr, w) {
  const half = Math.floor(w / 2);
  const out = new Array(arr.length);
  for (let i = 0; i < arr.length; i++) {
    let s = 0, n = 0;
    for (let k = -half; k <= half; k++) {
      const j = i + k;
      if (j >= 0 && j < arr.length) { s += arr[j]; n++; }
    }
    out[i] = n ? s / n : arr[i];
  }
  return out;
}

async function extractFrames(file, onProgress, onStage) {
  const url = URL.createObjectURL(file);
  const video = document.createElement('video');
  video.src = url;
  video.preload = 'auto';
  video.muted = true;
  video.playsInline = true;
  video.crossOrigin = 'anonymous';

  await new Promise((resolve, reject) => {
    video.addEventListener('loadedmetadata', () => resolve(), { once: true });
    video.addEventListener('error', () => reject(new Error('Could not read video.')), { once: true });
  });
  try { await video.play(); video.pause(); } catch(_){}

  const duration = isFinite(video.duration) && video.duration > 0 ? video.duration : 5;

  if (onStage) onStage('scanning');
  const samples = Math.max(MIN_SAMPLES, Math.min(MAX_SAMPLES, Math.round(duration * MOTION_FPS)));

  const mc = document.createElement('canvas');
  mc.width = MOTION_W; mc.height = MOTION_H;
  const mctx = mc.getContext('2d', { willReadFrequently: true });

  const motionTimes = [], motionScores = [];
  let prevGray = null;

  for (let i = 0; i < samples; i++) {
    const t = (duration * (i + 0.5)) / samples;
    await seek(video, t);
    mctx.drawImage(video, 0, 0, MOTION_W, MOTION_H);
    const data = mctx.getImageData(0, 0, MOTION_W, MOTION_H).data;
    const gray = new Uint8Array(MOTION_W * MOTION_H);
    for (let p = 0, g = 0; p < data.length; p += 4, g++) {
      gray[g] = (data[p]*299 + data[p+1]*587 + data[p+2]*114) / 1000;
    }
    let diff = 0;
    if (prevGray) {
      for (let g = 0; g < gray.length; g++) {
        const d = gray[g] - prevGray[g];
        diff += d < 0 ? -d : d;
      }
    }
    motionTimes.push(t);
    motionScores.push(diff);
    prevGray = gray;
    if (onProgress) onProgress(0.5 * ((i + 1) / samples));
  }

  // Max-energy sliding window swing detection.  A real golf swing is the
  // most concentrated burst of motion in the clip - so we slide a 1.8s
  // window across the motion curve and pick the window whose total motion
  // energy is highest.  No height thresholds, no peak picking, no fragile
  // sharpness math.  This handles videos with long still address periods,
  // long walks, bend-overs, and waggles - whatever the swing is, it's the
  // most-motion stretch.
  const smoothed = movingAverage(motionScores, 3);
  const WIN_S = 1.8;                             // detected window length
  const winSamples = Math.max(8, Math.round(MOTION_FPS * WIN_S));
  const halfWin = Math.floor(winSamples / 2);

  // Cumulative motion for O(1) window sums.
  const cum = new Array(smoothed.length + 1).fill(0);
  for (let i = 0; i < smoothed.length; i++) cum[i + 1] = cum[i] + smoothed[i];

  let bestStart = 0, bestEnergy = -1, bestPeakIdx = 0;
  for (let s = 0; s + winSamples <= smoothed.length; s++) {
    const energy = cum[s + winSamples] - cum[s];
    if (energy > bestEnergy) {
      bestEnergy = energy;
      bestStart = s;
    }
  }
  // Find the local peak inside the chosen window (used for label "peakTime").
  {
    let pv = -1;
    for (let i = bestStart; i < bestStart + winSamples; i++) {
      if (smoothed[i] > pv) { pv = smoothed[i]; bestPeakIdx = i; }
    }
  }

  const peakTime = motionTimes[bestPeakIdx] ?? duration / 2;
  let startTime = motionTimes[bestStart] ?? Math.max(0, peakTime - WIN_S / 2);
  let endTime = motionTimes[Math.min(smoothed.length - 1, bestStart + winSamples)] ?? Math.min(duration, peakTime + WIN_S / 2);

  // Real swings are roughly 1.4-2.4 s end-to-end; clamp generously.
  const MIN_WIN = 1.4, MAX_WIN = 2.4;
  let span = endTime - startTime;
  if (span < MIN_WIN) {
    const c = (startTime + endTime) / 2;
    startTime = Math.max(0, c - MIN_WIN / 2);
    endTime = Math.min(duration, startTime + MIN_WIN);
    if (endTime - startTime < MIN_WIN) startTime = Math.max(0, endTime - MIN_WIN);
  } else if (span > MAX_WIN) {
    const c = (startTime + endTime) / 2;
    startTime = Math.max(0, c - MAX_WIN / 2);
    endTime = Math.min(duration, startTime + MAX_WIN);
  }

  if (onStage) onStage('capturing');
  const frames = await sliceFrames(video, startTime, endTime, (p) => {
    if (onProgress) onProgress(0.5 + 0.5 * p);
  });

  return {
    frames,
    swing: { startTime, endTime, peakTime, durationMs: Math.round((endTime - startTime) * 1000) },
    videoUrl: url,
    videoDuration: duration,
  };
}

async function sliceFrames(video, startTime, endTime, onProgress) {
  const w = video.videoWidth || 720;
  const h = video.videoHeight || 1280;
  const scale = Math.min(1, OUT_MAX / Math.max(w, h));
  const cw = Math.max(1, Math.round(w * scale));
  const ch = Math.max(1, Math.round(h * scale));
  const oc = document.createElement('canvas');
  oc.width = cw; oc.height = ch;
  const octx = oc.getContext('2d');
  const frames = [];
  for (let i = 0; i < FRAME_COUNT; i++) {
    const f = (i + 0.5) / FRAME_COUNT;
    const t = startTime + (endTime - startTime) * f;
    await seek(video, t);
    octx.drawImage(video, 0, 0, cw, ch);
    const dataUrl = oc.toDataURL('image/jpeg', 0.78);
    const base64 = dataUrl.split(',')[1] || '';
    frames.push({ data: base64, label: FRAME_LABELS[i], timeMs: Math.round(t*1000), order: i });
    if (onProgress) onProgress((i+1) / FRAME_COUNT);
  }
  return frames;
}

async function extractFramesAtWindow(videoUrl, startTime, endTime, onProgress) {
  const video = document.createElement('video');
  video.src = videoUrl;
  video.preload = 'auto';
  video.muted = true;
  video.playsInline = true;
  video.crossOrigin = 'anonymous';
  await new Promise((resolve, reject) => {
    video.addEventListener('loadedmetadata', () => resolve(), { once: true });
    video.addEventListener('error', () => reject(new Error('Could not read video.')), { once: true });
  });
  try { await video.play(); video.pause(); } catch(_){}
  const frames = await sliceFrames(video, startTime, endTime, onProgress);
  return { frames, swing: { startTime, endTime, peakTime: (startTime+endTime)/2, durationMs: Math.round((endTime-startTime)*1000) } };
}

/* ===== AI call (FREE, no API key — via Pollinations public endpoint) =====
   Pollinations is a free public AI service. The user never needs an API key
   and never pays a cent. We send 12 frames + a coaching prompt and parse
   the JSON response. Cascades through several backend models on failure. */
async function analyzeFrames(frames) {
  const userContent = [
    { type: 'text', text: 'Analyze the golf swing in these 12 frames (in order from address to finish). Return ONLY the JSON described in the system instructions.' },
  ];
  for (const f of frames) {
    userContent.push({ type: 'text', text: `Frame ${(f.order ?? 0) + 1} of ${frames.length} — ${f.label} — at ~${f.timeMs} ms.` });
    userContent.push({
      type: 'image_url',
      image_url: { url: `data:image/jpeg;base64,${f.data}` },
    });
  }

  const messages = [
    { role: 'system', content: SYSTEM_PROMPT },
    { role: 'user', content: userContent },
  ];

  const models = await discoverVisionModels();
  let lastErr = null;
  let lastErrPeek = '';
  for (const model of models) {
    let res;
    try {
      res = await fetch(POLLINATIONS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model,
          messages,
          response_format: { type: 'json_object' },
          temperature: 0.4,
          max_tokens: 6000,
          private: true,
          referrer: 'golf-swing-coach',
        }),
      });
    } catch (e) { lastErr = e; continue; }

    if (!res.ok) {
      lastErr = new Error('http_' + res.status);
      // Try the next model on ANY error (404 model-not-found, 429 rate-
      // limit, 5xx, 4xx that's the model rejecting the input, etc.).
      lastErrPeek = await res.text().catch(() => '');
      continue;
    }

    const ct = res.headers.get('content-type') || '';
    let txt = '';
    if (ct.includes('application/json')) {
      const data = await res.json().catch(() => null);
      txt = data?.choices?.[0]?.message?.content || '';
      if (!txt && typeof data === 'string') txt = data;
      if (!txt && data?.content) txt = String(data.content);
    } else {
      txt = await res.text();
    }
    txt = (txt || '').trim();
    if (!txt) { lastErr = new Error('empty_response'); continue; }

    let s = txt;
    const fence = s.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (fence) s = fence[1].trim();
    const a = s.indexOf('{'), b = s.lastIndexOf('}');
    if (a !== -1 && b !== -1) s = s.slice(a, b + 1);
    try { return JSON.parse(s); }
    catch { lastErr = new Error('parse_error'); continue; }
  }
  // All models in the cascade failed.
  throw new Error('Coach is temporarily busy across all free models. Wait 20-30 seconds and try again. ' + (lastErrPeek ? '(Detail: ' + lastErrPeek.slice(0, 120) + ')' : ''));
}

function esc(s) {

    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function priorityTone(p) {
  const v = String(p || '').toLowerCase();
  if (v === 'high') return 'var(--danger)';
  if (v === 'medium') return 'var(--gold)';
  return 'var(--fairwayHi)';
}
function fmtTime(t) {

  return `${m}:${s.padStart(4,'0')}`;
}

// User scrubs the native video player to the moment of swing start (or
// finish), then taps the corresponding button. We snap the picked window
// boundary to the video's current playback time.
function markPickHere(which) {
  const v = document.getElementById('scrubVideo');
  if (!v) return;
  const t = Math.max(0, Math.min(state.videoDuration, Number(v.currentTime) || 0));
  let { start, end } = state.pickRange || { start: 0, end: Math.min(2, state.videoDuration) };

  if (which === 'start') {
    start = t;
    if (end <= start) end = Math.min(state.videoDuration, start + 1.5);
  } else {
    end = t;
    if (start >= end) start = Math.max(0, end - 1.5);
  }
  // Clamp to a sensible 0.6s..4.0s window length.
  const minWin = 0.6;
  const maxWin = Math.min(4.0, state.videoDuration);
  const span = end - start;
  if (span < minWin) {
    if (which === 'start') end = Math.min(state.videoDuration, start + minWin);
    else start = Math.max(0, end - minWin);
  }
  if (span > maxWin) {
    if (which === 'start') end = start + maxWin;
    else start = end - maxWin;
  }
  state.pickRange = { start, end };

  // Live-update the labels without a full re-render so the video keeps playing.
  const ls = document.getElementById('lblStart');
  const lw = document.getElementById('lblWindow');
  const le = document.getElementById('lblEnd');
  if (ls) ls.textContent = `START · ${fmtTime(start)}`;
  if (lw) lw.textContent = fmtTime(end - start);
  if (le) le.textContent = `END · ${fmtTime(end)}`;
}

            <div class="brd-what" style="${isOpen ? '' : 'display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden'}">${esc(fb.whatISee)}</div>
          </div>
          <span class="brd-chev" style="${isOpen ? 'color:var(--fairwayHi)' : ''}">${isOpen ? '▾' : '▸'}</span>
        </div>
        ${isOpen ? `<div class="brd-tip"><div class="brd-tip-label">► COACH TIP</div><div class="brd-tip-text">${esc(fb.tip)}</div></div>` : ''}
      </button>`;
    }).join('')}
  </div></div>
  ${r.nextVideoTip ? `
    <div class="frame"><div class="next-tip">
      <div class="next-tip-label">📡  TIP FOR YOUR NEXT VIDEO</div>
      <div class="next-tip-text">${esc(r.nextVideoTip)}</div>
    </div></div>` : ''}
  <button class="btn" onclick="reset()">
    <span class="btn-content"><span class="btn-icon">↻</span><span class="btn-text-stack"><span class="label">Analyze Another Swing</span><span class="caption">Run it back</span></span></span>
    <span class="btn-chev">▸</span>
  </button>`;
}

function toggleBrd(i) {
  setState({ openFrame: state.openFrame === i ? null : i });
}

function renderTakeaway(t, i) {
  const tone = priorityTone(t.priority);
  const mistakes = Array.isArray(t.commonMistakes) ? t.commonMistakes : [];
  return `
  <div class="frame">
    <div class="takeaway frame-inner">
      <div class="takeaway-head">
        <div class="takeaway-num" style="border-color:${tone};color:${tone}">${String(i+1).padStart(2,'0')}</div>
        <div style="flex:1;min-width:0">
          <div class="priority-pill" style="border-color:${tone};color:${tone}">${esc(String(t.priority || 'Medium').toUpperCase())} PRIORITY</div>
          <div class="takeaway-title">${esc(t.title)}</div>
        </div>
      </div>
      <div class="block" style="border-left-color:var(--gold)">
        <div class="block-label" style="color:var(--gold)">► WHAT'S WRONG</div>
        <div class="block-body">${esc(t.whatToFix)}</div>
      </div>
      <div class="block" style="border-left-color:var(--danger)">
        <div class="block-label" style="color:var(--danger)">► WHY IT'S COSTING YOU STROKES</div>
        <div class="block-body">${esc(t.whyItMatters)}</div>
      </div>
      <div class="block" style="border-left-color:var(--fairwayHi)">
        <div class="block-label" style="color:var(--fairwayHi)">► HOW TO FIX IT — STEP BY STEP</div>
        <div class="block-body">${esc(t.howToFix)}</div>
      </div>
      ${mistakes.length ? `
        <div class="block" style="border-left-color:var(--gold)">
          <div class="block-label" style="color:var(--gold)">► WATCH OUT FOR</div>
          <ul class="bullet-list">${mistakes.map(m => `<li>${esc(m)}</li>`).join('')}</ul>
        </div>` : ''}
      <div class="meta-row">
        <div class="meta-chip" style="background:#0A2418;border-color:var(--fairwayDeep)">
          <div class="meta-chip-label" style="color:var(--fairwayHi)">⏱  DO IT</div>
          <div class="meta-chip-text">${esc(t.reps)}</div>
        </div>
        <div class="meta-chip" style="background:#1A1300;border-color:var(--goldDeep)">
          <div class="meta-chip-label" style="color:var(--gold)">📉  HANDICAP IMPACT</div>
          <div class="meta-chip-text">${esc(t.estimatedHandicapImpact)}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function render() {
  const root = document.getElementById('root');
  let html = '';
  if (state.view === 'home') html = viewHome();
  else if (state.view === 'review') html = viewReview();
  else if (state.view === 'analyze') html = viewAnalyze();
  else if (state.view === 'results') html = viewResults();
  else html = viewHome();
  root.innerHTML = `
    <input id="fileInputLibrary" type="file" accept="video/*" style="display:none" onchange="onFile(this.files && this.files[0])" />
    <input id="fileInputCamera" type="file" accept="video/*" capture="environment" style="display:none" onchange="onFile(this.files && this.files[0])" />
    ${html}`;
}

window.addEventListener('DOMContentLoaded', render);
window.pickFile = pickFile;
window.onFile = onFile;
window.runAnalysis = runAnalysis;
window.rePick = rePick;
window.reset = reset;
window.setState = setState;
window.toggleScrubber = toggleScrubber;
window.markPickHere = markPickHere;
window.previewWindow = previewWindow;
window.toggleBrd = toggleBrd;
window.state = state;
</script>
</body>
</html>
