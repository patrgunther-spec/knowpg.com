<!doctype html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<meta name="theme-color" content="#06100A" />
<title>Golf Swing Coach</title>
<style>
:root{
  --bg:#06100A;--bgT:#0A1A11;--bgB:#03080A;
  --panel:#0F1C13;--panelHi:#16291C;--pBorder:#1F3A2A;

*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--white);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100%;-webkit-font-smoothing:antialiased}

button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:inherit;color:inherit}
a{color:var(--gold);text-decoration:none}
.container{max-width:720px;margin:0 auto;padding:16px 16px 80px}
.eyebrow{font-size:11px;letter-spacing:3px;font-weight:900;color:var(--gold);text-transform:uppercase}

.subtitle{font-size:14px;color:var(--silver);line-height:1.5;margin-top:12px}
.frame{border:2px solid var(--gold);background:#02080A;padding:2px;margin-bottom:16px}
.frame-inner{border:1px solid var(--pBorder);background:var(--panel)}
.hero{padding:22px;background:linear-gradient(180deg,#0A2418 0%,#06120C 100%);border:1px solid var(--pBorder)}

.btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:16px;border:2px solid var(--gold);background:linear-gradient(135deg,var(--fairwayHi),var(--fairwayDeep));color:var(--white);font-weight:900;letter-spacing:1.6px;text-transform:uppercase;font-style:italic;font-size:16px;margin-bottom:10px;-webkit-tap-highlight-color:transparent;transition:transform .06s ease,opacity .15s ease}

<body>
<main class="container" id="root"></main>

<script>
/* Golf Swing Coach - single-file standalone build.
 * Calls Google Gemini directly from the browser. The API key is stored only
 * in localStorage. No backend, no servers, no charges. */

const FRAME_LABELS = [
  'Address','Takeaway','Hands At Hip (Back)','Lead Arm Parallel (Back)',
  'Top Of Backswing','Transition','Lead Arm Parallel (Down)','Pre-Impact',
  'Impact','Post-Impact Extension','Mid Follow-Through','Finish'
];
const FRAME_COUNT = 12;
const MOTION_W = 96, MOTION_H = 144;
const MOTION_FPS = 30;
const MIN_SAMPLES = 30, MAX_SAMPLES = 600;
const OUT_MAX = 720;

const SCAN_QUOTES = [
  'Watching the whole clip…','Finding the actual swing…',
  'Skipping practice strokes…','Locking onto impact…'
];
const COACH_QUOTES = [
  'Loading the body-pose model…','Reading your address position…',
  'Measuring your shoulder turn…','Measuring your hip rotation…',
  'Checking your spine angle…','Tracking your head movement…',
  'Reading your weight transfer…','Looking at impact extension…',
  'Spotting strokes you can save…','Drafting your custom drills…',
  'Writing it all down…'
];

/* ===== State ===== */
const state = {
  view: 'home',
  frames: [],
  swing: null,
  videoUrl: null,
  videoDuration: 0,
  progress: 0,
  stage: 'idle',
  error: null,
  report: null,
  quoteIdx: 0,
  pickRange: null,
  showScrubber: false,
  openFrame: null,
};
let quoteTimer = null;

function setState(patch) {
  Object.assign(state, patch);
  render();
}

/* ===== Frame extraction with motion-based swing detection ===== */
function seek(video, t) {
  return new Promise((resolve, reject) => {
    const onSeeked = () => { cleanup(); setTimeout(resolve, 30); };
    const onError = () => { cleanup(); reject(new Error('Could not seek video.')); };
    const cleanup = () => {
      video.removeEventListener('seeked', onSeeked);
      video.removeEventListener('error', onError);
    };
    video.addEventListener('seeked', onSeeked);
    video.addEventListener('error', onError);
    video.currentTime = Math.max(0, t);
  });
}

function movingAverage(arr, w) {
  const half = Math.floor(w / 2);
  const out = new Array(arr.length);
  for (let i = 0; i < arr.length; i++) {
    let s = 0, n = 0;
    for (let k = -half; k <= half; k++) {
      const j = i + k;
      if (j >= 0 && j < arr.length) { s += arr[j]; n++; }
    }
    out[i] = n ? s / n : arr[i];
  }
  return out;
}

async function extractFrames(file, onProgress, onStage) {
  const url = URL.createObjectURL(file);
  const video = document.createElement('video');
  video.src = url;
  video.preload = 'auto';
  video.muted = true;
  video.playsInline = true;
  video.crossOrigin = 'anonymous';

  await new Promise((resolve, reject) => {
    video.addEventListener('loadedmetadata', () => resolve(), { once: true });
    video.addEventListener('error', () => reject(new Error('Could not read video.')), { once: true });
  });
  try { await video.play(); video.pause(); } catch(_){}

  const duration = isFinite(video.duration) && video.duration > 0 ? video.duration : 5;

  if (onStage) onStage('scanning');
  const samples = Math.max(MIN_SAMPLES, Math.min(MAX_SAMPLES, Math.round(duration * MOTION_FPS)));

  const mc = document.createElement('canvas');
  mc.width = MOTION_W; mc.height = MOTION_H;
  const mctx = mc.getContext('2d', { willReadFrequently: true });

  const motionTimes = [], motionScores = [];
  let prevGray = null;

  for (let i = 0; i < samples; i++) {
    const t = (duration * (i + 0.5)) / samples;
    await seek(video, t);
    mctx.drawImage(video, 0, 0, MOTION_W, MOTION_H);
    const data = mctx.getImageData(0, 0, MOTION_W, MOTION_H).data;
    const gray = new Uint8Array(MOTION_W * MOTION_H);
    for (let p = 0, g = 0; p < data.length; p += 4, g++) {
      gray[g] = (data[p]*299 + data[p+1]*587 + data[p+2]*114) / 1000;
    }
    let diff = 0;
    if (prevGray) {
      for (let g = 0; g < gray.length; g++) {
        const d = gray[g] - prevGray[g];
        diff += d < 0 ? -d : d;
      }
    }
    motionTimes.push(t);
    motionScores.push(diff);
    prevGray = gray;
    if (onProgress) onProgress(0.5 * ((i + 1) / samples));
  }

  // Max-energy sliding window swing detection.  A real golf swing is the
  // most concentrated burst of motion in the clip - so we slide a 1.8s
  // window across the motion curve and pick the window whose total motion
  // energy is highest.  No height thresholds, no peak picking, no fragile
  // sharpness math.  This handles videos with long still address periods,
  // long walks, bend-overs, and waggles - whatever the swing is, it's the
  // most-motion stretch.
  const smoothed = movingAverage(motionScores, 3);
  const WIN_S = 1.8;                             // detected window length
  const winSamples = Math.max(8, Math.round(MOTION_FPS * WIN_S));
  const halfWin = Math.floor(winSamples / 2);

  // Cumulative motion for O(1) window sums.
  const cum = new Array(smoothed.length + 1).fill(0);
  for (let i = 0; i < smoothed.length; i++) cum[i + 1] = cum[i] + smoothed[i];

  let bestStart = 0, bestEnergy = -1, bestPeakIdx = 0;
  for (let s = 0; s + winSamples <= smoothed.length; s++) {
    const energy = cum[s + winSamples] - cum[s];
    if (energy > bestEnergy) {
      bestEnergy = energy;
      bestStart = s;
    }
  }
  // Find the local peak inside the chosen window (used for label "peakTime").
  {
    let pv = -1;
    for (let i = bestStart; i < bestStart + winSamples; i++) {
      if (smoothed[i] > pv) { pv = smoothed[i]; bestPeakIdx = i; }
    }
  }

  const peakTime = motionTimes[bestPeakIdx] ?? duration / 2;
  let startTime = motionTimes[bestStart] ?? Math.max(0, peakTime - WIN_S / 2);
  let endTime = motionTimes[Math.min(smoothed.length - 1, bestStart + winSamples)] ?? Math.min(duration, peakTime + WIN_S / 2);

  // Real swings are roughly 1.4-2.4 s end-to-end; clamp generously.
  const MIN_WIN = 1.4, MAX_WIN = 2.4;
  let span = endTime - startTime;
  if (span < MIN_WIN) {
    const c = (startTime + endTime) / 2;
    startTime = Math.max(0, c - MIN_WIN / 2);
    endTime = Math.min(duration, startTime + MIN_WIN);
    if (endTime - startTime < MIN_WIN) startTime = Math.max(0, endTime - MIN_WIN);
  } else if (span > MAX_WIN) {
    const c = (startTime + endTime) / 2;
    startTime = Math.max(0, c - MAX_WIN / 2);
    endTime = Math.min(duration, startTime + MAX_WIN);
  }

  if (onStage) onStage('capturing');
  const frames = await sliceFrames(video, startTime, endTime, (p) => {
    if (onProgress) onProgress(0.5 + 0.5 * p);
  });

  return {
    frames,
    swing: { startTime, endTime, peakTime, durationMs: Math.round((endTime - startTime) * 1000) },
    videoUrl: url,
    videoDuration: duration,
  };
}

async function sliceFrames(video, startTime, endTime, onProgress) {
  const w = video.videoWidth || 720;
  const h = video.videoHeight || 1280;
  const scale = Math.min(1, OUT_MAX / Math.max(w, h));
  const cw = Math.max(1, Math.round(w * scale));
  const ch = Math.max(1, Math.round(h * scale));
  const oc = document.createElement('canvas');
  oc.width = cw; oc.height = ch;
  const octx = oc.getContext('2d');
  const frames = [];
  for (let i = 0; i < FRAME_COUNT; i++) {
    const f = (i + 0.5) / FRAME_COUNT;
    const t = startTime + (endTime - startTime) * f;
    await seek(video, t);
    octx.drawImage(video, 0, 0, cw, ch);
    const dataUrl = oc.toDataURL('image/jpeg', 0.78);
    const base64 = dataUrl.split(',')[1] || '';
    frames.push({ data: base64, label: FRAME_LABELS[i], timeMs: Math.round(t*1000), order: i });
    if (onProgress) onProgress((i+1) / FRAME_COUNT);
  }
  return frames;
}

async function extractFramesAtWindow(videoUrl, startTime, endTime, onProgress) {
  const video = document.createElement('video');
  video.src = videoUrl;
  video.preload = 'auto';
  video.muted = true;
  video.playsInline = true;
  video.crossOrigin = 'anonymous';
  await new Promise((resolve, reject) => {
    video.addEventListener('loadedmetadata', () => resolve(), { once: true });
    video.addEventListener('error', () => reject(new Error('Could not read video.')), { once: true });
  });
  try { await video.play(); video.pause(); } catch(_){}
  const frames = await sliceFrames(video, startTime, endTime, onProgress);
  return { frames, swing: { startTime, endTime, peakTime: (startTime+endTime)/2, durationMs: Math.round((endTime-startTime)*1000) } };
}

/* ===== Local AI coach (FREE, runs entirely in your browser) ================
   No API key, no third-party servers, no rate limits, no flaky public APIs.
   Uses TensorFlow.js + MoveNet (a body-pose detection model from Google)
   loaded from a CDN. We detect 17 body keypoints in each of the 12 frames,
   compute real golf-swing metrics from them, and generate the coaching
   report from those measurements with classic golf-instruction rules. */

let _tfReady = null;
let _detector = null;

function loadScript(src) {
  return new Promise((resolve, reject) => {
    if ([...document.scripts].some((s) => s.src === src)) return resolve();
    const s = document.createElement('script');
    s.src = src;
    s.async = true;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error('Could not load ' + src));
    document.head.appendChild(s);
  });
}

async function ensureTf() {
  if (_tfReady) return _tfReady;
  _tfReady = (async () => {
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js');
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js');
    if (window.tf?.setBackend) {
      try { await window.tf.setBackend('webgl'); await window.tf.ready(); } catch {}
    }
    _detector = await window.poseDetection.createDetector(
      window.poseDetection.SupportedModels.MoveNet,
      { modelType: window.poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
    );
  })();
  return _tfReady;
}

function loadImage(base64) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('image decode failed'));
    img.src = 'data:image/jpeg;base64,' + base64;
  });
}

async function analyzeFrames(frames) {
  await ensureTf();
  const poses = [];
  for (const f of frames) {
    try {
      const img = await loadImage(f.data);
      const results = await _detector.estimatePoses(img, { flipHorizontal: false });
      poses.push(results[0] || null);
    } catch {
      poses.push(null);
    }
  }
  return buildReportFromPoses(poses, frames);
}

/* ----- Pose math helpers --------------------------------------------- */

function kp(pose, name) {
  if (!pose || !pose.keypoints) return null;
  const k = pose.keypoints.find((p) => p.name === name);
  if (!k || (k.score != null && k.score < 0.3)) return null;
  return k;
}
function dist(a, b) { if (!a || !b) return 0; const dx = a.x - b.x, dy = a.y - b.y; return Math.sqrt(dx*dx + dy*dy); }
function mid(a, b) { if (!a || !b) return null; return { x: (a.x + b.x)/2, y: (a.y + b.y)/2 }; }
function angDeg(a, b) { if (!a || !b) return null; return Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI; }
function angAt(a, b, c) { // angle at vertex b between rays b->a and b->c, in degrees
  if (!a || !b || !c) return null;
  const v1 = { x: a.x - b.x, y: a.y - b.y };
  const v2 = { x: c.x - b.x, y: c.y - b.y };
  const dot = v1.x*v2.x + v1.y*v2.y;
  const m1 = Math.sqrt(v1.x*v1.x + v1.y*v1.y);
  const m2 = Math.sqrt(v2.x*v2.x + v2.y*v2.y);
  if (!m1 || !m2) return null;
  const cos = Math.max(-1, Math.min(1, dot / (m1 * m2)));
  return Math.acos(cos) * 180 / Math.PI;
}
function bodyHeight(pose) { // approx pixels from head to ankle
  const nose = kp(pose, 'nose');
  const la = kp(pose, 'left_ankle');
  const ra = kp(pose, 'right_ankle');
  if (!nose) return 0;
  const ankle = la || ra;
  if (!ankle) return 0;
  return Math.abs(ankle.y - nose.y);
}

/* ----- Camera angle and handedness detection -------------------------- */

function detectCameraAngle(addressPose) {
  const ls = kp(addressPose, 'left_shoulder');
  const rs = kp(addressPose, 'right_shoulder');
  const nose = kp(addressPose, 'nose');
  const le = kp(addressPose, 'left_ear');
  const re = kp(addressPose, 'right_ear');
  if (!ls || !rs) return 'unclear';
  const shoulderWidth = Math.abs(rs.x - ls.x);
  const earWidth = (le && re) ? Math.abs(re.x - le.x) : 0;
  const bh = bodyHeight(addressPose) || 1;
  const swRatio = shoulderWidth / bh;
  // Wide shoulders relative to body height = facing the camera (face-on).
  // Narrow shoulders = profile (down-the-line / behind).
  if (swRatio > 0.30) return 'face-on';
  if (swRatio < 0.18) return 'down-the-line';
  return 'unclear';
}

function detectHandedness(addressPose, topPose) {
  // Right-handed golfer: at the top of backswing, the lead (left) arm is
  // higher and the trail (right) arm is lower. We look at which wrist is
  // higher in the frame at the top.
  const lw = kp(topPose, 'left_wrist');
  const rw = kp(topPose, 'right_wrist');
  if (!lw || !rw) return 'right'; // most common default
  return rw.y < lw.y ? 'left' : 'right';
}

/* ----- Metrics ------------------------------------------------------- */

function computeMetrics(poses) {
  const valid = poses.filter(Boolean);
  if (valid.length < 4) return null;

  const address = poses[0];
  const top     = poses[4] || poses[3] || poses[5];
  const downHalf = poses[6] || poses[5];
  const impact  = poses[8] || poses[7];
  const finish  = poses[poses.length - 1];

  const cam = detectCameraAngle(address);
  const handed = detectHandedness(address, top);
  const bh = bodyHeight(address) || bodyHeight(top) || bodyHeight(impact) || 200;

  // 1. Head movement (max distance nose moved from address position)
  const noseAddr = kp(address, 'nose');
  let headMaxPx = 0, headMaxFrame = 0;
  let towardTargetMax = 0;
  for (let i = 0; i < poses.length; i++) {
    const n = kp(poses[i], 'nose');
    if (!n || !noseAddr) continue;
    const d = dist(n, noseAddr);
    if (d > headMaxPx) { headMaxPx = d; headMaxFrame = i; }
    // Toward-target = positive x direction for right-handed face-on, negative for down-the-line.
    // We just track the worst horizontal sway from address.
    const dx = n.x - noseAddr.x;
    if (Math.abs(dx) > Math.abs(towardTargetMax)) towardTargetMax = dx;
  }
  const headMovePctOfBody = bh ? (headMaxPx / bh) : 0;

  // 2. Shoulder rotation (address → top)
  const sa0 = angDeg(kp(address, 'left_shoulder'), kp(address, 'right_shoulder'));
  const sa1 = angDeg(kp(top,     'left_shoulder'), kp(top,     'right_shoulder'));
  const shoulderRot = (sa0 != null && sa1 != null) ? Math.abs(((sa1 - sa0 + 540) % 360) - 180) : null;

  // 3. Hip rotation (address → top)
  const ha0 = angDeg(kp(address, 'left_hip'), kp(address, 'right_hip'));
  const ha1 = angDeg(kp(top,     'left_hip'), kp(top,     'right_hip'));
  const hipRot = (ha0 != null && ha1 != null) ? Math.abs(((ha1 - ha0 + 540) % 360) - 180) : null;

  // 4. Spine angle change at impact vs address
  function spineAng(p) {
    const t = mid(kp(p, 'left_shoulder'), kp(p, 'right_shoulder'));
    const b = mid(kp(p, 'left_hip'),      kp(p, 'right_hip'));
    if (!t || !b) return null;
    return Math.atan2(t.x - b.x, b.y - t.y) * 180 / Math.PI;
  }
  const spA = spineAng(address);
  const spI = spineAng(impact);
  const spineDelta = (spA != null && spI != null) ? Math.abs(spI - spA) : null;

  // 5. Knee flex at address vs impact (right knee angle = hip-knee-ankle)
  function kneeAngle(p, side /* 'left'|'right' */) {
    return angAt(kp(p, side+'_hip'), kp(p, side+'_knee'), kp(p, side+'_ankle'));
  }
  const kneeAddrR = kneeAngle(address, 'right');
  const kneeImpR  = kneeAngle(impact,  'right');
  const rightKneeStraightening =
    (kneeAddrR != null && kneeImpR != null) ? (kneeImpR - kneeAddrR) : null;

  // 6. Stance width at address (vs body height)
  const stancePx = dist(kp(address, 'left_ankle'), kp(address, 'right_ankle'));
  const shouldersPx = dist(kp(address, 'left_shoulder'), kp(address, 'right_shoulder'));
  const stanceVsShoulders = (stancePx && shouldersPx) ? stancePx / shouldersPx : null;

  // 7. Lead arm extension at impact (lead = left for right-handed)
  const leadSide = handed === 'left' ? 'right' : 'left';
  const leadElbowAtImpact = angAt(
    kp(impact, leadSide+'_shoulder'),
    kp(impact, leadSide+'_elbow'),
    kp(impact, leadSide+'_wrist')
  );

  // 8. Finish hip rotation (hip line angle at finish vs address)
  const haF = angDeg(kp(finish, 'left_hip'), kp(finish, 'right_hip'));
  const finishHipRot = (ha0 != null && haF != null) ? Math.abs(((haF - ha0 + 540) % 360) - 180) : null;

  // 9. Head x-shift toward target at top (reverse-pivot detection)
  const noseTop = kp(top, 'nose');
  const headShiftAtTopX = (noseAddr && noseTop) ? (noseTop.x - noseAddr.x) : 0;
  // For right-handed face-on view: target is to the LEFT of frame (positive x = away from target).
  // For right-handed down-the-line: target is to the RIGHT (positive x = toward target).
  // We just flag any large horizontal move at top as suspect.
  const headShiftPct = bh ? (Math.abs(headShiftAtTopX) / bh) : 0;

  return {
    cameraAngle: cam,
    handedness: handed,
    bodyHeightPx: bh,
    headMaxPx,
    headMovePctOfBody,
    headMaxFrame,
    shoulderRotDeg: shoulderRot,
    hipRotDeg: hipRot,
    xFactor: (shoulderRot != null && hipRot != null) ? Math.max(0, shoulderRot - hipRot) : null,
    spineDelta,
    rightKneeStraightening,
    stanceVsShoulders,
    leadElbowAtImpact,
    finishHipRot,
    headShiftAtTopX,
    headShiftPctAtTop: headShiftPct,
  };
}

/* ----- Takeaway generator -------------------------------------------- */

function generateTakeaways(m) {
  const out = [];

  if (m.headMovePctOfBody != null && m.headMovePctOfBody > 0.04) {
    const inches = Math.round(m.headMovePctOfBody / 0.04 * 2.0); // rough scaling: 4% body ≈ 2-3 inches for adult
    const high = m.headMovePctOfBody > 0.07;
    out.push({
      title: 'Stop The Head Sway',
      whatToFix: `Your head moved about ${inches} inches during the swing (we measured ${(m.headMovePctOfBody*100).toFixed(1)}% of your body height). The head should stay almost still until well after impact.`,
      whyItMatters: 'When your head slides side to side, the bottom of your swing moves with it. That means fat shots (hitting the ground first), thin shots (hitting the top of the ball), and a lot of inconsistency. Pros keep their head within an inch or two.',
      howToFix: '1) Set up to a wall with a tee taped on the wall right where your nose is at address. 2) Take slow half-swings without letting the tee fall out of view. 3) Now do it with eyes closed for 10 reps. 4) Move outside, pick a single blade of grass next to the ball, and do not look away from it until you finish your swing. 5) Build up to full speed only after 30 reps where the tee never moved.',
      commonMistakes: ['Trying to keep the head perfectly frozen (some movement is fine)', 'Tensing the neck (stay relaxed)', 'Looking up to see the ball before contact'],
      reps: '20 wall-tee swings + 30 grass-blade swings, 4 times a week',
      estimatedHandicapImpact: high ? 'Save 3-5 strokes per round' : 'Save 1-2 strokes per round',
      priority: high ? 'High' : 'Medium',
    });
  }

  if (m.shoulderRotDeg != null && m.shoulderRotDeg < 70) {
    out.push({
      title: 'Finish Your Backswing',
      whatToFix: `At the top, your shoulders only rotated about ${Math.round(m.shoulderRotDeg)} degrees. A full turn is closer to 90 degrees - your back should be pointing at the target.`,
      whyItMatters: 'A short backswing means a short downswing, which means less club-head speed (slower swing = shorter shots). It also rushes your tempo, which causes pulls and slices.',
      howToFix: '1) Stand with your back to a wall, feet a few inches away. 2) Cross your arms on your chest and try to touch the wall with your right elbow (lefties: left elbow) without moving your feet. 3) That is the feeling of a full shoulder turn. 4) Now do it holding a club across your chest, slowly. 5) Make 20 of those, then take 10 swings with a 7-iron focusing on completing the turn before you start down.',
      commonMistakes: ['Lifting the arms instead of turning the body', 'Sliding the hips back instead of rotating', 'Rushing - pause for half a second at the top'],
      reps: '20 wall-touch turns + 10 swings, 3 times a week',
      estimatedHandicapImpact: 'Save 1-3 strokes per round + pick up 10-20 yards',
      priority: m.shoulderRotDeg < 55 ? 'High' : 'Medium',
    });
  }

  if (m.hipRotDeg != null && m.shoulderRotDeg != null && m.hipRotDeg > m.shoulderRotDeg * 0.7) {
    out.push({
      title: 'Restrict Your Hips At The Top',
      whatToFix: `Your hips turned ${Math.round(m.hipRotDeg)} degrees while your shoulders turned ${Math.round(m.shoulderRotDeg)}. The hips should turn about HALF as much as the shoulders to create power.`,
      whyItMatters: 'When the hips turn as much as the shoulders, you lose the spring-like wind-up. That is where the power comes from - shoulders fully turned, hips less. Without that gap (called the "X-Factor"), your swing is all arms.',
      howToFix: '1) Take your normal stance and place a chair behind your right hip (lefties: left hip). 2) Make backswings where your right hip stays in light contact with the chair. 3) Feel your shoulders keep turning while the hip stays put. 4) Do 20 slow backswings with this feel. 5) Hit balls with a foam ball under your right heel - it will keep your right hip from spinning.',
      commonMistakes: ['Locking the hip completely (a small turn is fine)', 'Letting the right knee straighten (keep flex)', 'Sliding the hips sideways'],
      reps: '20 chair-rep swings + 10 foam-ball drives, 3 times a week',
      estimatedHandicapImpact: 'Save 1-2 strokes per round + add yardage',
      priority: 'Medium',
    });
  }

  if (m.spineDelta != null && m.spineDelta > 10) {
    const hi = m.spineDelta > 18;
    out.push({
      title: 'Stop The Early Extension',
      whatToFix: `Your spine angle changed by about ${Math.round(m.spineDelta)} degrees from address to impact. That means you are standing up out of your posture (golf-speak: "early extension") - your hips push toward the ball at impact.`,
      whyItMatters: 'When you stand up, your hands have to back away from the ball to make room. That causes a slice, blocks (push to the right), and shots hit off the heel. It also kills consistency.',
      howToFix: '1) Stand with your butt against a wall in golf posture (a hand-width away from the wall is too far - your butt should touch). 2) Make slow swings keeping your butt in contact with the wall the whole way. 3) The feel is "sit into your back pocket" through impact. 4) Do 25 slow swings. 5) Now hit balls with a yoga block or hand towel between your right thigh and the wall - keep it pinned there through impact.',
      commonMistakes: ['Sitting back too far and falling on heels', 'Locking the knees in trying not to extend (stay athletic)', 'Forgetting to rotate - the answer is to rotate AND stay in posture'],
      reps: '25 wall-butt swings + range session, 3 times a week',
      estimatedHandicapImpact: hi ? 'Save 3-4 strokes per round' : 'Save 1-2 strokes per round',
      priority: hi ? 'High' : 'Medium',
    });
  }

  if (m.leadElbowAtImpact != null && m.leadElbowAtImpact < 155) {
    out.push({
      title: 'Extend Your Lead Arm At Impact',
      whatToFix: `Your lead arm was bent to about ${Math.round(m.leadElbowAtImpact)} degrees at impact. The lead arm should be nearly straight (170-180 degrees) at the moment the club hits the ball - if it folds, that is the "chicken wing".`,
      whyItMatters: 'A chicken wing means you are pulling up and across the ball instead of extending through it. That causes weak slices, low fades, and shots that lose distance.',
      howToFix: '1) Hold a folded-up towel under your lead armpit (left for righties). 2) Make half-swings keeping the towel pinned in place from address through impact. 3) The lead arm should feel like it is reaching long toward the target after the ball. 4) After 20 reps, drop the towel and hit short shots with the same feel - a long lead arm extension after impact. 5) Add full swings only after the half-swing feels easy.',
      commonMistakes: ['Locking the elbow too early before impact (it stays soft on the way down)', 'Stopping the swing at the ball - extend through it', 'Letting the trail arm overpower the lead'],
      reps: '20 towel half-swings + 10 short shots, 4 times a week',
      estimatedHandicapImpact: 'Save 1-2 strokes per round',
      priority: 'Medium',
    });
  }

  if (m.stanceVsShoulders != null && m.stanceVsShoulders < 1.0) {
    out.push({
      title: 'Widen Your Stance',
      whatToFix: `Your feet were narrower than your shoulders at address. For a full swing you want your feet about as wide as your shoulders, sometimes a hair wider for the driver.`,
      whyItMatters: 'A narrow stance means a tippy base. You will sway off the ball and lose balance, especially at faster swing speeds. Power and accuracy both come from a stable platform.',
      howToFix: '1) Stand tall with your arms relaxed. 2) Look down - your feet should be roughly under the outside edge of your shoulders. 3) For an iron, feet shoulder-width. For a driver, an inch or two wider. 4) Practice your setup in a mirror until shoulder-width feels normal. 5) Take swings and notice how much more stable you feel.',
      commonMistakes: ['Going too wide (you can\'t turn)', 'Toes pointed straight forward (flare them out 15-20 degrees for easier turn)', 'Forgetting to maintain knee flex'],
      reps: '5 minutes of mirror setup checks daily for 1 week',
      estimatedHandicapImpact: 'Save 1 stroke per round',
      priority: 'Low',
    });
  }

  if (m.finishHipRot != null && m.finishHipRot < 70) {
    out.push({
      title: 'Finish With Your Hips Facing The Target',
      whatToFix: `At the finish your hips only rotated about ${Math.round(m.finishHipRot)} degrees from address. A full finish has your belt buckle pointing AT the target, balanced on your front foot.`,
      whyItMatters: 'An incomplete finish means you slowed down through impact. The body is reading the brakes-tap as a signal to also slow your hands, which steals power and accuracy. Pros always rotate to a full balanced finish.',
      howToFix: '1) Take a slow swing and HOLD the finish position for 3 seconds before you put the club down. 2) Belt buckle to the target, weight on the lead foot, trail toe lightly touching the ground. 3) Make 20 of these slow swings, holding each finish. 4) Now do it at full speed - if you can\'t hold the finish, you are off-balance.',
      commonMistakes: ['Falling backward off the lead foot', 'Stopping the rotation halfway', 'Lifting up out of the finish posture'],
      reps: '20 slow hold-the-finish swings, every range session',
      estimatedHandicapImpact: 'Save 1-2 strokes per round',
      priority: 'Medium',
    });
  }

  if (m.headShiftPctAtTop > 0.04) {
    out.push({
      title: 'Stop The Reverse Pivot',
      whatToFix: `At the top of your backswing, your head shifted toward the target (a reverse pivot - your weight goes the wrong way). It should stay centered or move slightly AWAY from the target.`,
      whyItMatters: 'Reverse pivots cause two horrible misses: huge slices when the body cannot recover, and chunky shots when the weight stays back. You essentially load up on the wrong leg.',
      howToFix: '1) Get a soccer ball or basketball. 2) Stand in golf posture with the ball under your right foot (lefties: left foot). 3) Take a backswing - you should feel pressure go INTO the ball under your trail foot. 4) Now do 15 reps without the ball, feeling weight load into the trail leg on the way back. 5) Add a small foam pad under the lead foot for 10 reps - it will discourage you from loading into the lead side.',
      commonMistakes: ['Sliding instead of loading (rotate, do not sway)', 'Loading too far back (stay athletic, knee stays flexed)', 'Forgetting to shift back to the lead side on the way down'],
      reps: '15 ball-under-foot loads + 10 foam-pad swings, 3 times a week',
      estimatedHandicapImpact: 'Save 2-3 strokes per round',
      priority: 'High',
    });
  }

  // Always include a tempo / smooth-out reminder so we have at least 5 takeaways.
  if (out.length < 5) {
    out.push({
      title: 'Smooth Out Your Tempo',
      whatToFix: 'Your swing has the right pieces but the rhythm can be tightened up. A great tempo is a 3:1 ratio - the backswing takes about three counts and the downswing takes one count.',
      whyItMatters: 'Quick tempo causes off-line shots because the body parts get out of sequence. Smooth tempo lets every move happen in order: lower body starts down first, then torso, then arms, then hands.',
      howToFix: '1) Count "one - two - three" on the way back, "one" on the way down. 2) Try this with a 7-iron at half speed for 10 swings. 3) Then add the words "low and slow" on the takeaway. 4) Build up to full speed keeping the same rhythm. 5) On the course, take a deep breath before every swing - it resets your tempo.',
      commonMistakes: ['Rushing from the top (it is the most common error in golf)', 'Trying to swing easier instead of smoother', 'Counting different on every shot - keep it consistent'],
      reps: '10 counting-tempo swings, every range session',
      estimatedHandicapImpact: 'Save 1-2 strokes per round',
      priority: 'Low',
    });
  }

  // Sort: High → Medium → Low
  const order = { 'High': 0, 'Medium': 1, 'Low': 2 };
  out.sort((a, b) => (order[a.priority] ?? 3) - (order[b.priority] ?? 3));

  // Cap at 8 takeaways.
  return out.slice(0, 8);
}

/* ----- Frame breakdown text ----------------------------------------- */

function frameBreakdownFromPoses(poses) {
  const labels = FRAME_LABELS;
  return labels.map((label, i) => {
    const p = poses[i];
    if (!p) {
      return {
        label,
        whatISee: 'Could not get a clear read on your body in this frame. Try better lighting or a closer camera position next time.',
        tip: 'Keep your whole body in the frame so the coach can see every part of your swing.',
      };
    }
    return frameDescription(label, p, i, poses);
  });
}

function frameDescription(label, pose, idx, allPoses) {
  const sa = angDeg(kp(pose, 'left_shoulder'), kp(pose, 'right_shoulder'));
  const ha = angDeg(kp(pose, 'left_hip'), kp(pose, 'right_hip'));
  const sa0 = allPoses[0] ? angDeg(kp(allPoses[0], 'left_shoulder'), kp(allPoses[0], 'right_shoulder')) : null;
  const ha0 = allPoses[0] ? angDeg(kp(allPoses[0], 'left_hip'),       kp(allPoses[0], 'right_hip'))      : null;
  const sRot = (sa != null && sa0 != null) ? Math.round(Math.abs(((sa - sa0 + 540) % 360) - 180)) : null;
  const hRot = (ha != null && ha0 != null) ? Math.round(Math.abs(((ha - ha0 + 540) % 360) - 180)) : null;

  const noseHere = kp(pose, 'nose');
  const noseAddr = kp(allPoses[0], 'nose');
  const headDx = (noseHere && noseAddr) ? Math.round(noseHere.x - noseAddr.x) : 0;
  const headDy = (noseHere && noseAddr) ? Math.round(noseHere.y - noseAddr.y) : 0;

  const tips = {
    'Address': 'Set your feet shoulder-width, slight knee bend, hands hanging just below your shoulders, eyes on the ball.',
    'Takeaway': 'Move the club back with your shoulders and chest - the hands and arms stay quiet.',
    'Hands At Hip (Back)': 'The clubhead should be just outside your hands and pointing at the sky - check this in a mirror.',
    'Lead Arm Parallel (Back)': 'Lead arm parallel to the ground, club roughly perpendicular to it - this is the half-back checkpoint.',
    'Top Of Backswing': 'Back facing the target, lead shoulder under your chin, weight loaded into your trail heel.',
    'Transition': 'Shift pressure into the lead foot first, BEFORE your hands start coming down. Lower body leads.',
    'Lead Arm Parallel (Down)': 'Hands should be in front of your trail thigh now, clubhead behind the hands - that is "lag".',
    'Pre-Impact': 'Hips already starting to face the target, hands ahead of the ball, lead wrist flat.',
    'Impact': 'Hands AHEAD of the ball, lead arm straight, head behind the ball, weight 70% on the lead foot.',
    'Post-Impact Extension': 'Both arms long and reaching toward the target - the moment of full extension.',
    'Mid Follow-Through': 'Trail shoulder pointing under the chin, club coming up over the lead shoulder.',
    'Finish': 'Belt buckle to the target, weight fully on the lead foot, balanced - hold it for 3 seconds.',
  };

  let what = '';
  if (label === 'Address') {
    what = `Setup looks ${pose ? 'reasonable' : 'unclear'}. Shoulders are squared up, you have the basic athletic position.`;
  } else if (label === 'Top Of Backswing') {
    what = `Shoulders rotated ~${sRot ?? '?'}° from address, hips ~${hRot ?? '?'}°. ${sRot != null && sRot < 80 ? 'Backswing is a touch short - work on completing the turn.' : 'Solid amount of turn.'}`;
  } else if (label === 'Impact') {
    what = `At impact your shoulders have rotated back ~${sRot ?? '?'}° toward the target. ${headDx === 0 && headDy === 0 ? '' : `Head is ${Math.abs(headDx)} pixels ${headDx > 0 ? 'forward' : 'back'} of address.`}`;
  } else if (label === 'Finish') {
    what = `Hips rotated ${hRot ?? '?'}° at finish. ${hRot != null && hRot < 80 ? 'Finish is incomplete - keep rotating until your belt buckle faces the target.' : 'Nice complete finish position.'}`;
  } else {
    what = `Shoulders ~${sRot ?? '?'}° turned, hips ~${hRot ?? '?'}° turned at this checkpoint.`;
  }

  return { label, whatISee: what, tip: tips[label] || '' };
}

/* ----- Build the full report ----------------------------------------- */

function buildReportFromPoses(poses, frames) {
  const m = computeMetrics(poses);
  if (!m) {
    return {
      playerHandle: 'The Player',
      cameraAngle: 'unclear',
      handedness: 'right',
      summary: 'We could not get a clear read on your body in enough frames. Make sure your whole body (head to feet) is visible in the camera, with bright even lighting and not too much zoom.',
      oneThingYouDidWell: 'You took the swing - that is the first step. Now we need a cleaner film.',
      ballFlightExplanation: 'We need a clearer view of your body to predict ball flight.',
      frameBreakdown: FRAME_LABELS.map((label, i) => ({
        label,
        whatISee: 'Body not clearly visible.',
        tip: 'Frame the camera so we can see head to feet, side or face-on.',
      })),
      takeaways: [{
        title: 'Re-Film Your Swing With Better Framing',
        whatToFix: 'The body could not be detected reliably in your video.',
        whyItMatters: 'Without a clear view of your shoulders, hips, knees and arms, no coach (human or AI) can give you accurate fixes.',
        howToFix: '1) Stand the camera 8-10 feet away. 2) Show your whole body, head to feet. 3) Bright daylight or even indoor light - avoid backlighting. 4) Hold the camera steady (a tripod or a friend). 5) Frame from the side (down-the-line) for the best swing-plane view.',
        commonMistakes: ['Camera too close (cuts off feet)', 'Camera too far (body too small)', 'Backlighting (golfer is silhouetted)'],
        reps: 'Just one good clip',
        estimatedHandicapImpact: 'Setup for everything else',
        priority: 'High',
      }],
      practicePlan: { summary: 'Re-film your swing first, then come back.', weeklySchedule: [] },
      nextVideoTip: 'Stand 8-10 feet from the camera, side-view, bright light, head to feet visible.',
    };
  }

  const handles = ['The Architect', 'Smooth Operator', 'Big Hitter', 'The Tactician', 'Iron Man', 'The Crusher', 'Steady Hands', 'Power Move'];
  const handle = handles[Math.floor((frames[0]?.timeMs || 0) / 100) % handles.length];

  const takeaways = generateTakeaways(m);
  const frameBreakdown = frameBreakdownFromPoses(poses);

  // Summary built from headline metrics
  const summaryBits = [];
  if (m.shoulderRotDeg != null) summaryBits.push(`shoulder turn of ${Math.round(m.shoulderRotDeg)}°`);
  if (m.hipRotDeg != null) summaryBits.push(`hip turn of ${Math.round(m.hipRotDeg)}°`);
  if (m.headMovePctOfBody != null) summaryBits.push(`head moved ${(m.headMovePctOfBody*100).toFixed(1)}% of body height`);
  const summary = `Your swing showed a ${summaryBits.join(', ')}. ${
    takeaways.filter(t => t.priority === 'High').length > 0
      ? 'There are a couple of high-priority fixes that will pay off the fastest.'
      : 'The fundamentals are mostly there - the takeaways below will tighten the small stuff.'
  }`;

  // Pick a positive
  let positive = 'You took a committed swing - that is half the battle.';
  if (m.finishHipRot != null && m.finishHipRot >= 75) positive = `You rotated your hips ${Math.round(m.finishHipRot)}° to a nice complete finish at Frame 12.`;
  else if (m.shoulderRotDeg != null && m.shoulderRotDeg >= 80) positive = `You completed a full ${Math.round(m.shoulderRotDeg)}° shoulder turn at the top (Frame 5) - that is solid power potential.`;
  else if (m.headMovePctOfBody != null && m.headMovePctOfBody < 0.04) positive = `Your head stayed remarkably still through the swing (only ${(m.headMovePctOfBody*100).toFixed(1)}% of body height of movement). That is a great foundation.`;

  // Ball-flight forecast based on metrics
  let ballFlight = 'Based on what we see: ';
  const shots = [];
  if (m.spineDelta != null && m.spineDelta > 14) shots.push('thin / topped shots and pushes when your body stands up at impact');
  if (m.leadElbowAtImpact != null && m.leadElbowAtImpact < 150) shots.push('weak slices and pull-cuts from the chicken wing');
  if (m.headShiftPctAtTop > 0.04) shots.push('pulls and high-spin shots from the reverse pivot');
  if (m.shoulderRotDeg != null && m.shoulderRotDeg < 60) shots.push('a loss of distance from the short backswing');
  if (m.hipRotDeg != null && m.shoulderRotDeg != null && m.hipRotDeg > m.shoulderRotDeg * 0.7) shots.push('an inconsistent strike pattern from the over-rotated hips');
  if (shots.length === 0) ballFlight = 'Your swing pattern looks fairly clean. The most likely miss is a small directional inconsistency that will tighten up with the drills below.';
  else ballFlight += shots.join('; ') + '. The takeaways below knock those out.';

  // Practice plan combining the top drills
  const top = takeaways.slice(0, 3);
  const days = ['Monday', 'Wednesday', 'Friday', 'Saturday'];
  const practicePlan = {
    summary: 'Spend three short sessions a week working the top drills, plus one longer range session. Slow reps beat fast reps - golf is a habits game.',
    weeklySchedule: top.length ? top.map((t, i) => ({
      day: days[i] || days[0],
      focus: t.title + ' drill',
      minutes: 15,
    })).concat({
      day: 'Saturday',
      focus: 'Range session: combine the top drills + 30 full swings',
      minutes: 30,
    }) : [],
  };

  return {
    playerHandle: handle,
    cameraAngle: m.cameraAngle,
    handedness: m.handedness,
    summary,
    oneThingYouDidWell: positive,
    ballFlightExplanation: ballFlight,
    frameBreakdown,
    takeaways,
    practicePlan,
    nextVideoTip: m.cameraAngle === 'unclear'
      ? 'Try filming from the side (down-the-line) for the cleanest swing-plane view.'
      : 'For the next video, try a different angle - if you filmed face-on, try down-the-line. We can spot different things from each view.',
  };
}

// source: 'library' = open Photos picker (no `capture` attribute, so iOS
// shows the standard sheet starting with the Photo Library).

function pickFile(source) {
  const id = source === 'camera' ? 'fileInputCamera' : 'fileInputLibrary';
  const i = document.getElementById(id);

}

async function onFile(file) {
  if (!file) return;
  if (state.videoUrl) { try { URL.revokeObjectURL(state.videoUrl); } catch(_){} }
  setState({ view: 'analyze', stage: 'scanning', progress: 0, frames: [], swing: null, error: null, report: null, quoteIdx: 0 });
  startQuoteTimer();
  try {
    const r = await extractFrames(
      file,
      (p) => setState({ progress: p }),
      (s) => setState({ stage: s })
    );
    stopQuoteTimer();
    setState({
      frames: r.frames, swing: r.swing,
      videoUrl: r.videoUrl, videoDuration: r.videoDuration,
      stage: 'idle', view: 'review',
      pickRange: { start: r.swing.startTime, end: r.swing.endTime },
      showScrubber: false,
    });
  } catch (e) {
    stopQuoteTimer();
    setState({ stage: 'error', error: e.message || String(e) });
  }
}

async function runAnalysis(frames) {
  setState({ view: 'analyze', stage: 'analyzing', progress: 1, error: null, quoteIdx: 0 });
  startQuoteTimer();
  try {
    const report = await analyzeFrames(frames);
    stopQuoteTimer();
    setState({ report, stage: 'idle', view: 'results', openFrame: null });
  } catch (e) {
    stopQuoteTimer();
    setState({ stage: 'error', error: e.message || String(e) });
  }
}

async function rePick(start, end) {
  if (!state.videoUrl) return;
  setState({ view: 'analyze', stage: 'capturing', progress: 0, error: null });
  try {
    const r = await extractFramesAtWindow(state.videoUrl, start, end, (p) => setState({ progress: p }));
    setState({ frames: r.frames, swing: r.swing });
    await runAnalysis(r.frames);
  } catch (e) {
    setState({ stage: 'error', error: e.message || String(e) });
  }
}

function reset() {
  if (state.videoUrl) { try { URL.revokeObjectURL(state.videoUrl); } catch(_){} }
  setState({
    view: 'home', frames: [], swing: null, videoUrl: null, videoDuration: 0,
    progress: 0, stage: 'idle', error: null, report: null, quoteIdx: 0,
    pickRange: null, showScrubber: false, openFrame: null,

function startQuoteTimer() {
  stopQuoteTimer();
  quoteTimer = setInterval(() => setState({ quoteIdx: (state.quoteIdx || 0) + 1 }), 1800);
}
function stopQuoteTimer() {
  if (quoteTimer) { clearInterval(quoteTimer); quoteTimer = null; }
}

/* ===== Renderers ===== */
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function priorityTone(p) {
  const v = String(p || '').toLowerCase();
  if (v === 'high') return 'var(--danger)';
  if (v === 'medium') return 'var(--gold)';
  return 'var(--fairwayHi)';
}
function fmtTime(t) {
  const m = Math.floor(t / 60);
  const s = (t - m * 60).toFixed(1);
  return `${m}:${s.padStart(4,'0')}`;
}

// User scrubs the native video player to the moment of swing start (or
// finish), then taps the corresponding button. We snap the picked window
// boundary to the video's current playback time.
function markPickHere(which) {
  const v = document.getElementById('scrubVideo');
  if (!v) return;
  const t = Math.max(0, Math.min(state.videoDuration, Number(v.currentTime) || 0));
  let { start, end } = state.pickRange || { start: 0, end: Math.min(2, state.videoDuration) };

  if (which === 'start') {
    start = t;
    if (end <= start) end = Math.min(state.videoDuration, start + 1.5);
  } else {
    end = t;
    if (start >= end) start = Math.max(0, end - 1.5);
  }
  // Clamp to a sensible 0.6s..4.0s window length.
  const minWin = 0.6;
  const maxWin = Math.min(4.0, state.videoDuration);
  const span = end - start;
  if (span < minWin) {
    if (which === 'start') end = Math.min(state.videoDuration, start + minWin);
    else start = Math.max(0, end - minWin);
  }
  if (span > maxWin) {
    if (which === 'start') end = start + maxWin;
    else start = end - maxWin;
  }
  state.pickRange = { start, end };

  // Live-update the labels without a full re-render so the video keeps playing.
  const ls = document.getElementById('lblStart');
  const lw = document.getElementById('lblWindow');
  const le = document.getElementById('lblEnd');
  if (ls) ls.textContent = `START · ${fmtTime(start)}`;
  if (lw) lw.textContent = fmtTime(end - start);
  if (le) le.textContent = `END · ${fmtTime(end)}`;
}
function previewWindow() {
  const v = document.getElementById('scrubVideo');
  if (!v) return;
  const { start, end } = state.pickRange;
  v.currentTime = start;
  v.play().catch(()=>{});
  const stopAt = () => {
    if (v.currentTime >= end) { v.pause(); v.removeEventListener('timeupdate', stopAt); }
  };
  v.addEventListener('timeupdate', stopAt);
}

      <div class="block" style="border-left-color:var(--fairwayHi)">
        <div class="block-label" style="color:var(--fairwayHi)">► HOW TO FIX IT — STEP BY STEP</div>
        <div class="block-body">${esc(t.howToFix)}</div>
      </div>
      ${mistakes.length ? `
        <div class="block" style="border-left-color:var(--gold)">
          <div class="block-label" style="color:var(--gold)">► WATCH OUT FOR</div>
          <ul class="bullet-list">${mistakes.map(m => `<li>${esc(m)}</li>`).join('')}</ul>
        </div>` : ''}
      <div class="meta-row">
        <div class="meta-chip" style="background:#0A2418;border-color:var(--fairwayDeep)">
          <div class="meta-chip-label" style="color:var(--fairwayHi)">⏱  DO IT</div>
          <div class="meta-chip-text">${esc(t.reps)}</div>
        </div>
        <div class="meta-chip" style="background:#1A1300;border-color:var(--goldDeep)">
          <div class="meta-chip-label" style="color:var(--gold)">📉  HANDICAP IMPACT</div>
          <div class="meta-chip-text">${esc(t.estimatedHandicapImpact)}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function render() {
  const root = document.getElementById('root');
  let html = '';
  if (state.view === 'home') html = viewHome();
  else if (state.view === 'review') html = viewReview();
  else if (state.view === 'analyze') html = viewAnalyze();
  else if (state.view === 'results') html = viewResults();
  else html = viewHome();
  root.innerHTML = `
    <input id="fileInputLibrary" type="file" accept="video/*" style="display:none" onchange="onFile(this.files && this.files[0])" />
    <input id="fileInputCamera" type="file" accept="video/*" capture="environment" style="display:none" onchange="onFile(this.files && this.files[0])" />
    ${html}`;
}

window.addEventListener('DOMContentLoaded', () => {
  render();
  // Warm up TensorFlow + MoveNet in the background so the first analysis
  // doesn't have to wait for the ~4MB model to download.
  setTimeout(() => { ensureTf().catch(() => {}); }, 800);
});
window.pickFile = pickFile;
window.onFile = onFile;
window.runAnalysis = runAnalysis;
window.rePick = rePick;
window.reset = reset;
window.setState = setState;
window.toggleScrubber = toggleScrubber;
window.markPickHere = markPickHere;
window.previewWindow = previewWindow;
window.toggleBrd = toggleBrd;
window.state = state;
</script>
</body>
</html>
